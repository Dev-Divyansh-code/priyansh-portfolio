name: Keep site awake

on:
  schedule:
    # Ping every 14 minutes (Render free tier sleeps after ~15 min idle)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 30 "https://priyansh-portfolio-h5yf.onrender.com/api/health"
          echo "Site is up"