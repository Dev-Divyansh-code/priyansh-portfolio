services:
  - type: web
    name: priyansh-portfolio
    runtime: node
    plan: free
    buildCommand: npm install && npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CLIENT_URL
        sync: false